name: Bench

# Manual only — never on push/cron, and never commits results (the measurement
# session lives elsewhere). This is a SMOKE run: it proves the benchmark harness
# executes end-to-end on a neutral runner where no competitor is installed
# (ctags/ast-grep/01x all absent → every competitor cell is `n/a`, exit 0). The
# rendered markdown is uploaded as an artifact for inspection.

on:
  workflow_dispatch:

jobs:
  bench-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run bench harness (no --write)
        run: node scripts/bench/bench.mjs --repo socialgouv/code-du-travail-numerique --runs 2 | tee bench-output.md
      - uses: actions/upload-artifact@v4
        with:
          name: bench-output
          path: bench-output.md
